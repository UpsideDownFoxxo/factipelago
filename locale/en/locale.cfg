[traps]
atomic-rocket-trap=__1__ noticed you were cold and sent you their pocket sun! How heartwarming!
artillery-trap=__1__ mistook you for a biter nest. Take cover!
grenade-trap=__1__ is practicing their aim nearby... [font=default-large-bold][color=red]and you were NOT the target![/color][/font] 
cluster-grenade-trap=--Copyright __1__\nfunction create_cluster_grenade(depth)\n  data:extend({\n    type = "cluster",\n    name = "cluster-" .. depth,\n    distance = 2,\n    cluster_count = 4,\n    action_delivery = {\n      type = "projectile",\n      projectile = "cluster-grenade-" .. depth,\n      starting_speed = 0.1,\n      direction_deviation = 2 * math.pi,\n    },\n  })\n  create_cluster_grenade(depth + 1)\nend

atomic-cliff-remover-trap=__1__ has noticed how much you struggle with cliffs, so they decided to "help". Whatever works I guess...
evolution-trap-1=__1__ has unlocked [color=green][Technology: Evolution __2__%][/color] for your local wildlife!
evolution-trap-2=
spill-trap=You should really stop buying your clothes from __1__, the pockets never seem to last for long...
teleport-trap=We thought a change of scenery might be nice... and __1__ agreed!

atomic-rocket-trap-self=Pocket sun en route! You only have yourself to blame for this one...
artillery-trap-self=Yes. The artillery works. Now, did you remember to take the shell out before targeting yourself?
cluster-grenade-trap-self=Prepare for trouble. And make it... 3? 4? How many grenades are in a cluster again?
grenade-trap-self=Somehow you turned a grenade into a boomerang. Congratulations! I'd be impressed if it wasn't such a bad idea.

atomic-cliff-remover-trap-self=Really? You know cliff explosives are a thing right? Still insist on the nuke? Fine...
evolution-trap-1-self=Oh no... someone left a couple science packs lying around in biter range!
evolution-trap-2-self=[color=green][Biters][/color] researched [color=green][Technology: Evolution __2__%][/color].
spill-trap-self=Watch out, the floor might be a bit slip... damn it, too late!
teleport-trap-self=Very nice idea of you to take a walk! A change in perspective can sometimes help with solving problems you're stuck on.

teleport-timeout=You were actually supposed to teleport, but I didn't find an accessible spot to safely put you. Tells me that where you are right now is already worse than what I could ever hope to achieve.

